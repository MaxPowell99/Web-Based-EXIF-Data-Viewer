<!DOCTYPE html>
<html lang="en">
<head>
    <title>EXIF Data Viewer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <link rel="stylesheet" href="Styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="Scripts/javascript.js" defer></script>
</head>

<body>
    <div class="grid-container">
        <header>
            <h1>EXIF Data Viewer</h1>        
        </header>

        <nav>
            <ul>
                <li><a href="index.html" class="active">Upload</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>

        <section class="upload-section">
            <h2>View your image's EXIF data</h2>
            <div class="upload-box">
                <label for="imageInput" class="upload-label">
                    <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                    <p id="uploadText">Click to upload an image</p>
                    <span id="uploadStatus"></span>
                    <span id="fileName"></span>  
                    <span id="fileInfo">Upload a JPG or JPEG image to continue.</span>
                    <p id="uploadExtra"></p>
                    <input type="file" id="imageInput" accept=".jpg,.jpeg,.tif,.png,.heic,.gif,.webp">
                </label>
            </div>

            <div class="extract-button-container">
                <button id="extractButton" class="extract-button">
                    Extract EXIF Data
                </button>
            </div>
        </section>

        <div class="left-column">
            <section class="preview">
                <h2>Image Preview</h2>
                <div class="preview-section" id="imagePreview"></div>
            </section>

            <section class="export">
                <h2>Export EXIF Data</h2>
                <div class="export-container">
                    <h3>Choose a Format</h3>
                    <div class="export-controls">
                        <select id="exportFormat">
                            <option value="">Select format</option>
                            <option value="pdf">.pdf</option>
                            <option value="csv">.csv</option>
                            <option value="json">.json</option>
                            <option value="php">.php</option>
                            <option value="xml">.xml</option>
                        </select>
                        <button id="exportButton">
                            <i class="fa-solid fa-download"></i> Export
                        </button>
                    </div>
                </div>
            </section>

            <section class="remove-exif">
                <h2>Download Clean Image</h2>
                <div class="remove-exif-container">
                    <div class="remove-text">
                        <h3>Remove EXIF Data & Download Clean Image</h3>
                        <button id="removeExifBtn" disabled>
                            <i class="fa-solid fa-download"></i> Download
                        </button>
                    </div>
                </div>
            </section>
        </div>

        <div class="right-column">
            <section class="exif-data">
                <h2>EXIF Data</h2>
                <div id="exifOutput"></div>
            </section>
        </div>

        <footer>
            <p><u>"The Grey Hats" - EXIF Data Viewer Project</u></p>
        </footer>
    </div>
</body>
</html>
